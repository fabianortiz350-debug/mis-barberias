<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Dueño | Agendate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1a1a; --accent: #d4af37; --bg: #f4f7f6; --danger: #ff4d4d; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 250px; background: var(--primary); height: 100vh; color: white; padding: 30px 20px; position: fixed; }
        .logo { font-weight: 800; font-size: 22px; margin-bottom: 40px; }
        .logo span { color: var(--accent); }
        .menu-item { padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .menu-item.active { background: rgba(212, 175, 55, 0.2); color: var(--accent); }
        .main-content { margin-left: 290px; padding: 40px; width: calc(100% - 330px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .stat-card h3 { margin: 0; color: #666; font-size: 14px; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: 800; color: var(--primary); }
        .table-container { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #888; border-bottom: 1px solid #eee; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #f9f9f9; font-size: 14px; font-weight: 600; }
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 11px; text-transform: uppercase; }
        .badge-confirmada { background: #e8f5e9; color: #2e7d32; }
        .btn-action { border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">AGENDATE<span>LIVE</span></div>
        <div class="menu-item active">📊 Estadísticas</div>
        <div class="menu-item" onclick="location.href='login.html'" style="margin-top: 50px; color: #ff4d4d;">🚪 Salir</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 style="font-weight: 800;">Panel del Dueño</h1>
            <div id="user-info" style="font-weight: 600; font-size: 14px; color: #666;">Cargando usuario...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Citas Hoy</h3><p id="stat-hoy">0</p></div>
            <div class="stat-card"><h3>Total Mes</h3><p id="stat-mes">0</p></div>
            <div class="stat-card"><h3>Ingresos Est.</h3><p id="stat-ingresos">$0</p></div>
        </div>

        <div class="table-container">
            <h2 style="font-weight: 800; font-size: 18px; margin: 0;">Gestión de Citas</h2>
            <table>
                <thead>
                    <tr>
                        <th>CLIENTE</th>
                        <th>BARBERO</th>
                        <th>FECHA/HORA</th>
                        <th>ESTADO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="lista-citas-admin">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. Configuración Inicial
        const API = "https://mis-barberias.onrender.com";
        
        // 2. Ejecutar al cargar la página
        window.onload = function() {
            console.log("Iniciando Panel...");
            
            const adminEmail = localStorage.getItem('admin_email');
            const negocioId = localStorage.getItem('negocio_id');
            const rol = localStorage.getItem('admin_rol');

            // Verificación de seguridad
            if (!adminEmail || rol !== 'ADMIN') {
                alert("Sesión no válida. Redirigiendo al login...");
                window.location.href = 'login.html';
                return;
            }

            // Mostrar el email
            const displayEmail = document.getElementById('user-info');
            if(displayEmail) displayEmail.innerText = adminEmail;

            // Cargar Citas
            if(negocioId) {
                cargarCitas(negocioId);
            } else {
                console.error("No se encontró ID de negocio");
            }
        };

        async function cargarCitas(id) {
            try {
                const res = await fetch(`${API}/api/citas/negocio/${id}`);
                const citas = await res.json();
                
                const tbody = document.getElementById('lista-citas-admin');
                if(!tbody) return;
                
                tbody.innerHTML = "";
                let hoyCount = 0;
                const hoyFecha = new Date().toISOString().split('T')[0];

                citas.forEach(cita => {
                    if(cita.fecha === hoyFecha) hoyCount++;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cita.clienteNombre || 'N/A'}</td>
                        <td>${cita.barbero || 'Sin asignar'}</td>
                        <td>${cita.fecha}<br><small>${cita.hora}</small></td>
                        <td><span class="badge badge-confirmada">${cita.estado || 'confirmada'}</span></td>
                        <td><button class="btn-action">✏️</button></td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('stat-hoy').innerText = hoyCount;
                document.getElementById('stat-mes').innerText = citas.length;
                document.getElementById('stat-ingresos').innerText = "$" + (citas.length * 25000).toLocaleString();

            } catch (error) {
                console.error("Error cargando citas:", error);
            }
        }
    </script>
</body>
</html>
