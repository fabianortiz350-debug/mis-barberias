<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Equipo | Agendate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1a1a; --accent: #d4af37; --bg: #f4f7f6; --danger: #ff4d4d; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--primary); height: 100vh; color: white; padding: 30px 20px; position: fixed; }
        .logo { font-weight: 800; font-size: 22px; margin-bottom: 40px; }
        .logo span { color: var(--accent); }
        .menu-item { padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 10px; color: #aaa; text-decoration: none; }
        .menu-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .menu-item.active { background: rgba(212, 175, 55, 0.2); color: var(--accent); }

        /* Contenido Principal */
        .main-content { margin-left: 290px; padding: 40px; width: calc(100% - 330px); }
        
        .header { margin-bottom: 30px; }
        .header h1 { font-weight: 800; margin: 0; }

        /* Formulario */
        .form-card { background: white; padding: 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .form-card h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; }
        .input-group { display: flex; gap: 15px; flex-wrap: wrap; }
        input { padding: 12px 15px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-family: inherit; flex: 1; min-width: 200px; }
        input:focus { border-color: var(--accent); }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: var(--accent); transform: translateY(-2px); }

        /* Tabla */
        .table-container { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #888; border-bottom: 1px solid #eee; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #f9f9f9; font-size: 14px; font-weight: 600; }
        .rol-badge { background: #fff8e1; color: #f57f17; padding: 5px 10px; border-radius: 8px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">AGENDATE<span>LIVE</span></div>
        <div class="menu-item" onclick="location.href='panel-dueno.html'">📊 Estadísticas</div>
        <div class="menu-item active" onclick="location.href='gestion-staff.html'">💈 Mi Equipo (Staff)</div>
        <div class="menu-item" onclick="cerrarSesion()" style="margin-top: 50px; color: var(--danger);">🚪 Salir</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Gestión de Staff</h1>
            <p style="color: #666;">Registra y administra a los barberos de tu negocio.</p>
        </div>
        
        <div class="form-card">
            <h3>+ Registrar Nuevo Barbero</h3>
            <div class="input-group">
                <input type="text" id="staff-nombre" placeholder="Nombre completo">
                <input type="email" id="staff-correo" placeholder="Correo electrónico">
                <input type="password" id="staff-pass" placeholder="Contraseña temporal">
                <button class="btn-add" onclick="registrarStaff()">Agregar al Equipo</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>NOMBRE</th>
                        <th>CORREO</th>
                        <th>ROL</th>
                        <th>ESTADO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="lista-staff">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://mis-barberias.onrender.com";
        const negocioId = localStorage.getItem('negocio_id');

        window.onload = function() {
            if(!negocioId || localStorage.getItem('admin_rol') !== 'ADMIN') {
                window.location.href = 'login.html';
                return;
            }
            cargarStaff();
        };

        async function registrarStaff() {
            const nombre = document.getElementById('staff-nombre').value.trim();
            const correo = document.getElementById('staff-correo').value.trim();
            const password = document.getElementById('staff-pass').value;

            if(!nombre || !correo || !password) return alert("Por favor, completa todos los campos.");

            try {
                const res = await fetch(`${API}/api/admin/registrar-staff`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nombre, correo, password, negocioId })
                });
                const data = await res.json();
                
                if(data.success) {
                    alert("¡Barbero registrado con éxito!");
                    document.getElementById('staff-nombre').value = "";
                    document.getElementById('staff-correo').value = "";
                    document.getElementById('staff-pass').value = "";
                    cargarStaff();
                } else {
                    alert(data.error || "Error al registrar");
                }
            } catch (e) {
                alert("Error de conexión con el servidor");
            }
        }

        async function cargarStaff() {
            try {
                const res = await fetch(`${API}/api/admin/staff/${negocioId}`);
                const staff = await res.json();
                const tbody = document.getElementById('lista-staff');
                tbody.innerHTML = "";

                if(staff.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:#888;'>No hay barberos registrados aún.</td></tr>";
                    return;
                }

                staff.forEach(s => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${s.nombre}</td>
                        <td>${s.correo}</td>
                        <td><span class="rol-badge">BARBERO</span></td>
                        <td><span style="color: #2e7d32;">● Activo</span></td>
                        <td>
                            <button onclick="alert('ID: ${s._id}')" style="border:none; background:none; cursor:pointer;">⚙️</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("Error al cargar staff:", e);
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
