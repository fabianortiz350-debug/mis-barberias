<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agendate Live | Tu tiempo, nuestra prioridad</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a1a1a; 
            --accent: #d4af37; 
            --bg: #ffffff;
            --pastel-green: #e8f5e9; 
            --pastel-purple: #f3e5f5;
            --pastel-blue: #e3f2fd; 
            --pastel-orange: #fff3e0;
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }

        /* --- NAVBAR --- */
        nav { 
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 5%; background: white; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000; gap: 12px;
        }
        .nav-top-row { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 20px; cursor: pointer; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--accent); }

        .nav-actions { display: flex; align-items: center; gap: 12px; position: relative; }
        .btn-auth { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 700; font-size: 11px; cursor: pointer; white-space: nowrap; transition: 0.3s; }

        .user-menu {
            position: absolute; top: 110%; right: 0; background: white; 
            min-width: 180px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; flex-direction: column; overflow: hidden; border: 1px solid #eee; z-index: 2001;
        }
        .user-menu.active { display: flex; animation: slideDown 0.3s ease; }
        .user-menu-item { padding: 12px 20px; font-size: 13px; font-weight: 600; color: #333; cursor: pointer; border-bottom: 1px solid #f5f5f5; text-align: left; }
        .user-menu-item:hover { background: #f9f9f9; color: var(--accent); }

        /* --- BUSCADOR --- */
        .search-container {
            display: flex; width: 100%; max-width: 650px; background: #f4f4f4; 
            border-radius: 30px; padding: 4px; border: 1px solid #ddd;
        }
        .search-box { display: flex; flex: 1; align-items: center; padding: 0 10px; border-right: 1px solid #ddd; }
        /* Cambio 3: Font-size 16px para que los navegadores móviles no hagan zoom al enfocar */
        .search-box input { border: none; background: transparent; padding: 8px; width: 100%; font-size: 16px; outline: none; }

        @media (min-width: 992px) {
            nav { flex-direction: row; justify-content: space-between; padding: 15px 5%; }
            .nav-top-row { width: auto; }
            .search-container { flex: 1; margin: 0 40px; }
        }

        /* --- HERO --- */
        .hero { padding: 50px 5%; text-align: center; background: linear-gradient(-45deg, #ffffff, #f3e5f5, #e3f2fd, #fff3e0); background-size: 400% 400%; animation: gradientMove 12s ease infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .hero h1 { font-size: 36px; font-weight: 800; margin: 0; }

        /* --- CARRUSEL --- */
        .category-wrapper-pro { position: relative; max-width: 1200px; margin: auto; padding: 0 5%; }
        .category-container { 
            display: flex; gap: 15px; overflow-x: auto; padding: 25px 0;
            scroll-behavior: smooth; scrollbar-width: none;
        }
        .category-container::-webkit-scrollbar { display: none; }

        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee;
            cursor: pointer; z-index: 10;
        }
        .arrow-left { left: 2%; } /* Cambio 2: Siempre visible para permitir scroll a la izquierda */
        .arrow-right { right: 2%; }

        .cat-card { min-width: 140px; padding: 30px 15px; border-radius: 28px; text-align: center; cursor: pointer; background: white; border: 1px solid rgba(0,0,0,0.03); transition: 0.3s; }
        .cat-card:hover { transform: translateY(-8px); }

        /* --- SECCIONES --- */
        .btn-back-container { display: none; padding: 20px 5% 0; max-width: 1200px; margin: auto; }
        .btn-back { background: #f0f0f0; border: none; padding: 10px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; }
        
        .section-content { max-width: 1200px; margin: auto; padding: 20px 5%; }
        #perfil-detalle, #seccion-mis-citas { display: none; }
        
        .cita-card { background: white; border: 1px solid #eee; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* --- RESERVA --- */
        .reserva-contenedor { background: #f9f9f9; padding: 20px; border-radius: 24px; border: 1px solid #eee; }
        /* Cambio 3: Font-size 16px evita el zoom en móviles */
        .input-vip { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
        .grid-horas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .hora-btn { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .hora-btn.seleccionada { background: var(--accent); color: white; border-color: var(--accent); }
        .hora-btn:disabled { background: #eee; color: #bbb; cursor: not-allowed; }

        #modal-auth { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; position: relative; text-align: center; }
        .auth-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
        
        .btn-book { width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body onload="verificarSesionAlCargar()">

    <nav>
        <div class="nav-top-row">
            <div class="logo" onclick="volverInicio()">AGENDATE<span>LIVE</span></div>
            <div class="nav-actions">
                <span class="lang-selector">🇨🇴</span>
                <button class="btn-auth" id="btn-auth-main" onclick="abrirAuth()">Iniciar sesión</button>
                <div class="user-menu" id="user-menu-dropdown">
                    <div class="user-menu-item" onclick="mostrarMisCitas()">📅 Mis Citas</div>
                    <div class="user-menu-item" onclick="cerrarSesion()">🚪 Cerrar Sesión</div>
                </div>
            </div>
        </div>
        <div class="search-container">
            <div class="search-box"><input type="text" placeholder="Código, Negocio o Servicio"></div>
            <button style="background:var(--accent); color:white; border:none; width:34px; height:34px; border-radius:50%; cursor:pointer;">🔍</button>
        </div>
    </nav>

    <div class="hero" id="hero-area">
        <h1>Busca, Reserva y Disfruta.</h1>
        <p>¡Eres nuestra Prioridad!</p>
    </div>

    <div class="btn-back-container" id="back-container">
        <button class="btn-back" onclick="volverInicio()">← Regresar</button>
    </div>

    <div class="section-content">
        <h2 id="section-title" style="font-weight: 800; font-size: 24px;">Explora Categorías</h2>
        
        <div class="category-wrapper-pro" id="wrapper-cats">
            <div class="nav-arrow arrow-left" onclick="scrollCat(-220)">❮</div>
            <div class="nav-arrow arrow-right" onclick="scrollCat(220)">❯</div>
            <div class="category-container" id="categorias">
                <div class="cat-card" style="background:var(--pastel-orange)" onclick="cargarNegocios('barberia')"><i>💈</i><span>Barberías</span></div>
                <div class="cat-card" style="background:var(--pastel-purple)" onclick="cargarNegocios('spa')"><i>💅</i><span>Spa</span></div>
                <div class="cat-card" style="background:var(--pastel-blue)" onclick="cargarNegocios('odontologia')"><i>🦷</i><span>Odontología</span></div>
                <div class="cat-card" style="background:var(--pastel-green)" onclick="cargarNegocios('veterinaria')"><i>🐾</i><span>Veterinarias</span></div>
                <div class="cat-card" style="background:var(--pastel-orange)" onclick="cargarNegocios('automotriz')"><i>🔧</i><span>Automotriz</span></div>
            </div>
        </div>

        <div id="perfil-detalle">
            <img id="p-imagen" style="width:100%; border-radius:30px; height:350px; object-fit:cover; margin-bottom:25px;" src="">
            <h1 id="p-nombre" style="font-weight: 800; font-size: 32px; margin:0;"></h1>
            <p id="p-ubicacion" style="color: #666; margin-bottom: 30px;"></p>
            
            <div class="reserva-contenedor">
                <h3 style="font-weight: 800; margin-top: 0;">Reserva tu espacio</h3>
                <div id="campos-dinamicos">
                    </div>
                <input type="date" id="fecha-reserva" class="input-vip" onchange="cargarHorasDisponibles()">
                <div id="contenedor-horas" class="grid-horas"></div>
                <button class="btn-book" id="btn-finalizar-reserva" onclick="enviarReserva()" style="height: 60px; font-size: 18px; margin-top: 25px; border-radius: 20px;">AGENDAR CITA</button>
            </div>
        </div>

        <div id="seccion-mis-citas">
            <h2 style="font-weight: 800;">Tus Citas Reservadas</h2>
            <div id="contenedor-citas"></div>
        </div>
    </div>

    <div id="modal-auth">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarAuth()">&times;</span>
            <h2 style="font-weight: 800;">Acceso</h2>
            <div id="auth-formularios">
                <input type="email" id="auth-email" class="auth-input" placeholder="correo@ejemplo.com">
                <button class="btn-book" onclick="solicitarCodigo()">Enviar Código</button>
            </div>
            <div id="auth-paso-2" style="display:none;">
                <input type="text" id="auth-codigo" class="auth-input" placeholder="Código de 6 dígitos">
                <button class="btn-book" onclick="confirmarCodigo()">Verificar e Ingresar</button>
            </div>
        </div>
    </div>

    <script>
        const api = "https://mis-barberias.onrender.com"; 
        let usuarioEmail = localStorage.getItem('agendate_user_email') || "";
        let usuarioLogueado = !!usuarioEmail;
        let horaSeleccionada = null;

        // Cambio 6: Estructuras de datos para formularios por categoría
        const configCategorias = {
            barberia: {
                nombre: "The King's Cut",
                img: "https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=800",
                campos: '<input type="text" id="reserva-nombre" class="input-vip" placeholder="Nombre completo"><input type="tel" id="reserva-telefono" class="input-vip" placeholder="Teléfono"><input type="text" id="extra-1" class="input-vip" placeholder="Servicio (Corte, Barba)">'
            },
            automotriz: {
                nombre: "Premium Car Service",
                img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=800",
                campos: '<input type="text" id="reserva-nombre" class="input-vip" placeholder="Nombre del propietario"><input type="text" id="extra-1" class="input-vip" placeholder="Placa del Vehículo"><input type="text" id="extra-2" class="input-vip" placeholder="Marca y Modelo">'
            },
            odontologia: {
                nombre: "Dental Advanced",
                img: "https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=800",
                campos: '<input type="text" id="reserva-nombre" class="input-vip" placeholder="Nombre del paciente"><input type="text" id="extra-1" class="input-vip" placeholder="Motivo de consulta">'
            }
        };

        function scrollCat(val) { document.getElementById('categorias').scrollLeft += val; }

        function volverInicio() {
            // Cambio 5: Asegura que todo se limpie al regresar
            document.getElementById('wrapper-cats').style.display = 'block';
            document.getElementById('hero-area').style.display = 'block';
            document.getElementById('section-title').style.display = 'block';
            document.getElementById('perfil-detalle').style.display = 'none';
            document.getElementById('seccion-mis-citas').style.display = 'none';
            document.getElementById('back-container').style.display = 'none';
        }

        async function mostrarMisCitas() {
            if(!usuarioLogueado) return abrirAuth();
            // Cambio 5: Ocultar el resto al entrar a mis citas
            document.getElementById('wrapper-cats').style.display = 'none';
            document.getElementById('hero-area').style.display = 'none';
            document.getElementById('section-title').style.display = 'none';
            document.getElementById('perfil-detalle').style.display = 'none';
            document.getElementById('seccion-mis-citas').style.display = 'block';
            document.getElementById('back-container').style.display = 'block';
            document.getElementById('user-menu-dropdown').classList.remove('active');

            const contenedor = document.getElementById('contenedor-citas');
            contenedor.innerHTML = "<p>Cargando historial...</p>";
            
            try {
                const res = await fetch(`${api}/mis-citas?email=${usuarioEmail}`);
                const citas = await res.json();
                contenedor.innerHTML = "";
                // El backend ya las trae ordenadas (Cambio 4)
                citas.forEach(cita => {
                    const card = document.createElement('div');
                    card.className = 'cita-card';
                    card.innerHTML = `<div><strong>#${cita.reservaId}</strong><br>${cita.barbero}<br><small>${cita.fecha} - ${cita.hora}</small></div>
                                      <button class="btn-cancelar" onclick="cancelarCita('${cita._id}')">Cancelar</button>`;
                    contenedor.appendChild(card);
                });
            } catch (e) { contenedor.innerHTML = "Error al cargar historial."; }
        }

        async function cancelarCita(id) {
            if(!confirm("¿Deseas cancelar?")) return;
            const res = await fetch(`${api}/cancelar-cita`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, email: usuarioEmail })
            });
            if(res.ok) { alert("Cita cancelada. Se liberó el horario."); mostrarMisCitas(); }
        }

        function cargarNegocios(tipo) {
            const conf = configCategorias[tipo] || configCategorias['barberia'];
            document.getElementById('wrapper-cats').style.display = 'none';
            document.getElementById('hero-area').style.display = 'none';
            document.getElementById('section-title').style.display = 'none';
            document.getElementById('perfil-detalle').style.display = 'block';
            document.getElementById('back-container').style.display = 'block';
            
            document.getElementById('p-nombre').innerText = conf.nombre;
            document.getElementById('p-imagen').src = conf.img;
            document.getElementById('campos-dinamicos').innerHTML = conf.campos;
        }

        // --- AUTH Y CARGA DE HORAS (Similares a tu código anterior) ---
        function abrirAuth() { document.getElementById('modal-auth').style.display = 'flex'; }
        function cerrarAuth() { document.getElementById('modal-auth').style.display = 'none'; }
        
        async function cargarHorasDisponibles() {
            const fecha = document.getElementById('fecha-reserva').value;
            const barbero = document.getElementById('p-nombre').innerText;
            const res = await fetch(`${api}/disponibilidad?fecha=${fecha}&barbero=${barbero}`);
            const data = await res.json();
            const horas = ["08:00", "09:00", "10:00", "11:00", "14:00", "15:00", "16:00"];
            const cont = document.getElementById('contenedor-horas');
            cont.innerHTML = "";
            horas.forEach(h => {
                const b = document.createElement('button');
                b.innerText = h; b.className = 'hora-btn';
                if(data.ocupadas.includes(h)) b.disabled = true;
                b.onclick = () => {
                    document.querySelectorAll('.hora-btn').forEach(x => x.classList.remove('seleccionada'));
                    b.classList.add('seleccionada'); horaSeleccionada = h;
                };
                cont.appendChild(b);
            });
        }

        async function enviarReserva() {
            if(!usuarioLogueado) return abrirAuth();
            const resId = "AG-" + Math.floor(Math.random()*9000);
            const datos = {
                clienteNombre: document.getElementById('reserva-nombre').value,
                clienteEmail: usuarioEmail,
                barbero: document.getElementById('p-nombre').innerText,
                fecha: document.getElementById('fecha-reserva').value,
                hora: horaSeleccionada,
                reservaId: resId
            };
            const res = await fetch(`${api}/reservar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            if(res.ok) { alert("¡Reserva exitosa!"); location.reload(); }
        }

        function verificarSesionAlCargar() {
            if(usuarioEmail) {
                document.getElementById('btn-auth-main').innerText = usuarioEmail.split('@')[0];
            }
        }
        
        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
