<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Agendate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1a1a; --accent: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); display: flex; }
        
        /* Sidebar lateral */
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; padding: 30px 20px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { font-weight: 800; font-size: 22px; margin-bottom: 40px; text-align: center; }
        .sidebar h2 span { color: var(--accent); }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; color: #999; font-weight: 600; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: var(--accent); color: var(--primary); font-weight: 800; }

        /* Contenido principal */
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #eee; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stat-card h3 { margin: 0; font-size: 32px; font-weight: 800; }
        .stat-card p { color: #666; margin: 5px 0 0; font-size: 14px; font-weight: 600; }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-add:hover { background: var(--accent); color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .badge-admin { background: #e3f2fd; color: #1976d2; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>AGENDATE<span>LIVE</span></h2>
        <div class="nav-item active">🏢 Negocios</div>
        <div class="nav-item" onclick="alert('Próximamente: Gestión de Usuarios Globales')">👥 Usuarios</div>
        <div class="nav-item" onclick="cerrarSesion()" style="margin-top: 40px; color: #ff4d4d;">🚪 Cerrar Sesión</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1 style="margin:0; font-weight: 800;">Panel de Control Total</h1>
                <p id="admin-info" style="color: #888; margin-top: 5px;">Verificando credenciales...</p>
            </div>
        </div>

        <div class="grid">
            <div class="stat-card">
                <h3 id="count-negocios">0</h3>
                <p>Barberías Activas</p>
            </div>
            <div class="stat-card">
                <h3 style="color: #2e7d32;">Online</h3>
                <p>Estado del Sistema</p>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; font-weight: 800;">Registrar Nueva Barbería</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: end;">
                <div>
                    <label style="font-size: 12px; font-weight: 700;">Nombre del Negocio</label>
                    <input type="text" id="neg-nombre" placeholder="Ej: Barbería Deluxe">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 700;">Ciudad / Ubicación</label>
                    <input type="text" id="neg-ubicacion" placeholder="Ej: Madrid">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 700;">Email del Dueño (Admin)</label>
                    <input type="email" id="neg-admin" placeholder="dueño@correo.com">
                </div>
            </div>
            <button class="btn-add" id="btn-crear" onclick="crearNegocio()">+ Dar de Alta Negocio</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0; font-weight: 800;">Directorio de Negocios</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Ubicación</th>
                        <th>Administrador Responsable</th>
                        <th>Fecha de Alta</th>
                    </tr>
                </thead>
                <tbody id="lista-negocios">
                    <tr><td colspan="4" style="text-align:center; color:#999; padding:20px;">Cargando base de datos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://mis-barberias.onrender.com";

        window.onload = () => {
            // Sincronización con las llaves correctas del Login
            const email = localStorage.getItem('user_email');
            const rol = localStorage.getItem('user_rol');
            const nombre = localStorage.getItem('user_nombre');

            // Seguridad: Solo el rol SUPER puede estar aquí
            if (!email || rol !== 'SUPER') {
                console.warn("Acceso no autorizado");
                localStorage.clear();
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('admin-info').innerText = `Sesión iniciada como: ${nombre || email} (SUPER ADMIN)`;
            cargarNegocios();
        };

        async function cargarNegocios() {
            try {
                const res = await fetch(`${API}/api/negocios`);
                if(!res.ok) throw new Error("Error API");
                const negocios = await res.json();
                
                const tabla = document.getElementById('lista-negocios');
                const contador = document.getElementById('count-negocios');
                tabla.innerHTML = "";
                contador.innerText = negocios.length;

                if(negocios.length === 0) {
                    tabla.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No hay negocios registrados.</td></tr>";
                    return;
                }

                negocios.forEach(n => {
                    const fecha = n.creadoEn ? new Date(n.creadoEn).toLocaleDateString() : 'N/A';
                    tabla.innerHTML += `
                        <tr>
                            <td><b style="color: var(--primary);">${n.nombre}</b></td>
                            <td>${n.ubicacion || 'No especificada'}</td>
                            <td><span class="badge-admin">${n.adminEmail}</span></td>
                            <td>${fecha}</td>
                        </tr>
                    `;
                });
            } catch (e) { 
                console.error("Error:", e);
                document.getElementById('lista-negocios').innerHTML = "<tr><td colspan='4' style='text-align:center; color:red;'>Error al conectar con la base de datos.</td></tr>";
            }
        }

        async function crearNegocio() {
            const nombre = document.getElementById('neg-nombre').value.trim();
            const ubicacion = document.getElementById('neg-ubicacion').value.trim();
            const adminEmail = document.getElementById('neg-admin').value.trim();
            const btn = document.getElementById('btn-crear');

            if(!nombre || !adminEmail) return alert("El nombre y el email del dueño son obligatorios.");

            btn.disabled = true;
            btn.innerText = "Procesando alta...";

            try {
                const res = await fetch(`${API}/api/admin/crear-negocio`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nombre, ubicacion, adminEmail })
                });

                const data = await res.json();

                if(res.ok) {
                    alert("Negocio registrado exitosamente.");
                    location.reload();
                } else {
                    alert("Error: " + (data.mensaje || "No se pudo crear el negocio"));
                    btn.disabled = false;
                    btn.innerText = "+ Dar de Alta Negocio";
                }
            } catch (e) { 
                alert("Error de conexión al intentar crear el negocio.");
                btn.disabled = false;
                btn.innerText = "+ Dar de Alta Negocio";
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
