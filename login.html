<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Agendate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .logo { font-weight: 800; font-size: 22px; margin-bottom: 30px; }
        .logo span { color: #d4af37; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a1a1a; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">AGENDATE<span>LIVE</span></div>
        <form id="form-login">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">INGRESAR</button>
        </form>
        <p id="error-msg" style="color:red; font-size:12px; margin-top:10px; display:none;">Credenciales incorrectas</p>
    </div>

    <script>
        document.getElementById('form-login').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Llamada a tu API de Render para validar
            const res = await fetch('https://mis-barberias.onrender.com/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, pass })
            });

            const data = await res.json();

            if (res.ok) {
                // Guardamos el token y el rol
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('userName', data.nombre);
                
                if(data.role === 'ADMIN') {
                    window.location.href = 'panel-dueno.html';
                } else {
                    window.location.href = `panel-empleado.html?empleado=${data.nombre}`;
                }
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
