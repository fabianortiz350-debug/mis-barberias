<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | Agendate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1a1a; --accent: #d4af37; --bg: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: #f9f9f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .login-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; }
        .logo { font-weight: 800; font-size: 24px; margin-bottom: 20px; color: var(--primary); }
        .logo span { color: var(--accent); }
        
        h2 { font-weight: 800; font-size: 20px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }

        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; outline: none; font-size: 16px; box-sizing: border-box; font-family: inherit; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
        
        .btn-login { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-login:hover { background: var(--accent); transform: translateY(-2px); }
        
        #paso-2 { display: none; }
        .loader { display: none; color: var(--accent); margin-top: 10px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">AGENDATE<span>LIVE</span></div>
        
        <div id="paso-1">
            <h2>Panel de Gestión</h2>
            <p>Ingresa tus credenciales para recibir tu código de acceso.</p>
            <input type="email" id="email" placeholder="Correo electrónico" required onkeypress="if(event.key==='Enter') iniciarLogin()">
            <input type="password" id="password" placeholder="Contraseña" required onkeypress="if(event.key==='Enter') iniciarLogin()">
            <button class="btn-login" id="btn-envio" onclick="iniciarLogin()">Continuar</button>
            <div id="load-1" class="loader">Validando datos y enviando código...</div>
        </div>

        <div id="paso-2">
            <h2>Verificar Identidad</h2>
            <p>Introduce el código de 6 dígitos que enviamos a tu correo.</p>
            <input type="text" id="codigo" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing: 5px; font-weight: 800; font-size: 24px;" onkeypress="if(event.key==='Enter') verificarCodigo()">
            <button class="btn-login" style="background: var(--accent);" onclick="verificarCodigo()">Acceder al Panel</button>
            <p style="margin-top: 20px; font-size: 12px; cursor: pointer; color: #888;" onclick="location.reload()">¿Error en los datos? Volver</p>
        </div>
    </div>

    <script>
        const API = "https://mis-barberias.onrender.com";
        let userEmail = "";

        async function iniciarLogin() {
            userEmail = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if(!userEmail || !pass) return alert("Completa todos los campos");
            if(!userEmail.includes("@")) return alert("Ingresa un correo válido");

            const btn = document.getElementById('btn-envio');
            const loader = document.getElementById('load-1');

            btn.disabled = true;
            loader.style.display = 'block';

            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: userEmail, password: pass })
                });

                const data = await res.json();

                if(res.ok) {
                    document.getElementById('paso-1').style.display = 'none';
                    document.getElementById('paso-2').style.display = 'block';
                } else {
                    alert(data.mensaje || "Credenciales incorrectas");
                    btn.disabled = false;
                    loader.style.display = 'none';
                }
            } catch (e) { 
                alert("Error de conexión con el servidor. Revisa tu internet."); 
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        async function verificarCodigo() {
            const code = document.getElementById('codigo').value.trim();
            if(code.length < 6) return alert("Ingresa el código completo de 6 dígitos");

            try {
                const res = await fetch(`${API}/api/auth/verificar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: userEmail, codigo: code })
                });

                const data = await res.json();
                
                if(data.success) {
                    // Guardamos la sesión de forma segura en el navegador
                    localStorage.setItem('admin_email', data.correo);
                    localStorage.setItem('admin_rol', data.rol);
                    localStorage.setItem('negocio_id', data.negocioId || "");

                    redirigirDinamico(data.rol);
                } else {
                    alert(data.mensaje || "Código incorrecto o expirado");
                }
            } catch (e) { 
                alert("Error al verificar el código."); 
            }
        }

        function redirigirDinamico(rol) {
            // El servidor nos dice qué rol tiene el usuario y lo enviamos a su panel
            const rutas = {
                'SUPER': 'super-admin.html',
                'ADMIN': 'panel-dueno.html',
                'STAFF': 'panel-empleado.html'
            };

            const destino = rutas[rol];

            if(destino) {
                window.location.href = destino;
            } else {
                alert("No tienes permisos asignados. Contacta al soporte.");
                location.reload();
            }
        }
    </script>
</body>
</html>
