<script>
    const API = "https://mis-barberias.onrender.com";
    
    // Leemos exactamente lo que tu login guarda en localStorage
    const adminEmail = localStorage.getItem('admin_email');
    const negocioId = localStorage.getItem('negocio_id'); // Coincide con login.html
    const rol = localStorage.getItem('admin_rol');

    // Seguridad
    if(!adminEmail || rol !== 'ADMIN') window.location.href = 'login.html';
    
    document.getElementById('user-info').innerText = adminEmail;

    async function cargarCitasGlobales() {
        if(!negocioId) return console.error("No hay ID de negocio");
        
        try {
            // Usamos la nueva ruta que creamos en server.js
            const res = await fetch(`${API}/api/citas/negocio/${negocioId}`); 
            const citas = await res.json();
            
            const tbody = document.getElementById('lista-citas-admin');
            tbody.innerHTML = "";
            
            let hoyCount = 0;
            const hoyFecha = new Date().toISOString().split('T')[0];

            citas.forEach(cita => {
                if(cita.fecha === hoyFecha) hoyCount++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${cita.clienteNombre}</td>
                    <td>${cita.barbero || 'Sin asignar'}</td>
                    <td>${cita.fecha}<br><small>${cita.hora}</small></td>
                    <td><span class="badge badge-${cita.estado}">${cita.estado}</span></td>
                    <td>
                        <button class="btn-action btn-edit" onclick="alert('Próximamente...')">✏️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-hoy').innerText = hoyCount;
            document.getElementById('stat-mes').innerText = citas.length;
            document.getElementById('stat-ingresos').innerText = "$" + (citas.filter(c => c.estado === 'confirmada').length * 25000).toLocaleString();

        } catch (e) { console.error("Error cargando citas", e); }
    }
</script>
