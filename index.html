<button class="btn-main" onclick="confirmar()">Confirmar Cita Now</button>
        <button id="btnCal" class="btn-main" style="display:none; background:#fff; color:#000;" onclick="agregarCalendario()">📅 Agregar a mi Agenda</button>
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <p style="font-size: 10px; color: #666;">¿NECESITAS CANCELAR?</p>
        <input type="text" id="codCancel" placeholder="Ingresa tu código R-0000" style="font-size: 10px; padding: 5px;">
        <button onclick="cancelarReserva()" style="background:none; border:1px solid red; color:red; font-size:10px; cursor:pointer; padding:5px; width:100%;">CANCELAR CITA</button>
    </div>

    <script>
        // ... (Mantén tus funciones cargarHoras y agregarCalendario igual) ...

        async function confirmar() {
            // ... (Asegúrate de capturar todos los campos) ...
            const res = await fetch(`${api}/reservar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await res.json();
            if(res.ok) {
                alert(`✅ ¡Cita Confirmada!\nTu código de cancelación es: ${result.codigo}\nSe ha enviado un correo al barbero.`);
                document.getElementById('btnCal').style.display = "block";
                cargarHoras(); // Recarga para bloquear la hora recién tomada
            } else {
                alert("❌ " + result.error);
            }
        }

        async function cancelarReserva() {
            const cod = document.getElementById('codCancel').value;
            if(!cod) return alert("Escribe el código.");
            
            const res = await fetch(`${api}/cancelar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ codigo: cod })
            });

            if(res.ok) {
                alert("🗑️ Cita cancelada con éxito. La hora vuelve a estar libre.");
                location.reload();
            } else {
                alert("❌ Código incorrecto o cita no encontrada.");
            }
        }
    </script>
