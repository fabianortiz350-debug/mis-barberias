<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Barber - Agenda Privada</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #d4af37; text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        .btn-refresh { background: #d4af37; color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 900; cursor: pointer; display: block; margin: 20px auto; transition: 0.3s; }
        .btn-refresh:hover { background: #fff; transform: scale(1.05); }
        .card-container { display: grid; gap: 15px; margin-top: 20px; }
        .cita-card { background: #1a1a1a; border-left: 5px solid #d4af37; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .cita-info b { color: #d4af37; display: block; font-size: 1.1rem; }
        .cita-info span { color: #aaa; font-size: 0.9rem; }
        .btn-whatsapp { background: #25d366; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }
        @media (max-width: 600px) { .cita-card { flex-direction: column; text-align: center; gap: 15px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>💈 Mi Agenda VIP</h1>
        <button class="btn-refresh" onclick="cargarAgenda()">🔄 Actualizar Citas</button>
        <div id="listaCitas" class="card-container">
            </div>
    </div>

    <script>
        async function cargarAgenda() {
            const lista = document.getElementById('listaCitas');
            lista.innerHTML = "<p style='text-align:center;'>Cargando citas...</p>";

            try {
                // Como este archivo vive en el mismo servidor de Render, usamos la ruta relativa
                const res = await fetch('/ver-agenda');
                const citas = await res.json();

                lista.innerHTML = "";
                if (citas.length === 0) {
                    lista.innerHTML = "<p style='text-align:center;'>No hay citas todavía. ¡A trabajar!</p>";
                    return;
                }

                citas.forEach(cita => {
                    const card = document.createElement('div');
                    card.className = 'cita-card';
                    card.innerHTML = `
                        <div class="cita-info">
                            <b>${cita.fecha} — ${cita.hora}</b>
                            <span>Cliente: ${cita.clienteNombre}</span>
                            <span>Barbero: ${cita.barbero}</span>
                        </div>
                        <a href="https://wa.me/${cita.clienteTelefono}" target="_blank" class="btn-whatsapp">
                            📱 WHATSAPP
                        </a>
                    `;
                    lista.appendChild(card);
                });
            } catch (e) {
                lista.innerHTML = "<p style='text-align:center; color:red;'>Error al conectar con el servidor.</p>";
            }
        }
        // Cargar automáticamente al abrir
        cargarAgenda();
    </script>
</body>
</html>
