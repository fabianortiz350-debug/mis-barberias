<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Agendate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a1a1a; --accent: #d4af37; --bg: #f4f7f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); display: flex; }
        
        /* Sidebar lateral */
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; padding: 30px 20px; position: fixed; }
        .sidebar h2 { color: var(--accent); font-size: 22px; margin-bottom: 40px; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--accent); color: var(--primary); font-weight: 700; }

        /* Contenido principal */
        .main-content { margin-left: 300px; padding: 40px; width: calc(100% - 340px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .stat-card h3 { margin: 0; font-size: 28px; }
        .stat-card p { color: #666; margin: 5px 0 0; }

        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        .btn-add { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-add:hover { background: var(--accent); color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>AGENDATE<span>LIVE</span></h2>
        <div class="nav-item active">🏢 Negocios</div>
        <div class="nav-item">👥 Usuarios</div>
        <div class="nav-item" onclick="cerrarSesion()">🚪 Cerrar Sesión</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Panel de Super Admin</h1>
            <p id="admin-name">Cargando...</p>
        </div>

        <div class="grid">
            <div class="stat-card">
                <h3 id="count-negocios">0</h3>
                <p>Barberías Activas</p>
            </div>
            <div class="stat-card">
                <h3>100%</h3>
                <p>Estado Servidor</p>
            </div>
        </div>

        <div class="card">
            <h3>Registrar Nueva Barbería</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="neg-nombre" placeholder="Nombre de la Barbería">
                <input type="text" id="neg-ubicacion" placeholder="Ubicación (Ciudad)">
                <input type="email" id="neg-admin" placeholder="Correo del Dueño">
                <button class="btn-add" onclick="crearNegocio()">+ Registrar Negocio</button>
            </div>
        </div>

        <div class="card">
            <h3>Negocios Registrados</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Ubicación</th>
                        <th>Administrador</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="lista-negocios">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://mis-barberias.onrender.com";

        // Al cargar la página, verificamos sesión y traemos datos
        window.onload = () => {
            const nombre = localStorage.getItem('admin_email');
            const rol = localStorage.getItem('admin_rol');

            if (!nombre || rol !== 'SUPER') {
                window.location.href = 'login.html';
            }
            document.getElementById('admin-name').innerText = `Bienvenido: ${nombre}`;
            cargarNegocios();
        };

        async function cargarNegocios() {
            try {
                const res = await fetch(`${API}/api/negocios`);
                const negocios = await res.json();
                
                const tabla = document.getElementById('lista-negocios');
                const contador = document.getElementById('count-negocios');
                tabla.innerHTML = "";
                contador.innerText = negocios.length;

                negocios.forEach(n => {
                    tabla.innerHTML += `
                        <tr>
                            <td><b>${n.nombre}</b></td>
                            <td>${n.ubicacion}</td>
                            <td>${n.adminEmail}</td>
                            <td>${new Date(n.creadoEn).toLocaleDateString()}</td>
                        </tr>
                    `;
                });
            } catch (e) { console.error("Error cargando negocios", e); }
        }

        async function crearNegocio() {
            const nombre = document.getElementById('neg-nombre').value;
            const ubicacion = document.getElementById('neg-ubicacion').value;
            const adminEmail = document.getElementById('neg-admin').value;

            if(!nombre || !adminEmail) return alert("Faltan datos");

            try {
                const res = await fetch(`${API}/api/admin/crear-negocio`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nombre, ubicacion, adminEmail })
                });

                if(res.ok) {
                    alert("Negocio creado con éxito");
                    location.reload();
                }
            } catch (e) { alert("Error al crear"); }
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
