<script>
    const api = "https://mis-barberias.onrender.com";
    let miNegocioActual = null;
    let serviciosLocales = [];

    async function loginDueño() {
        const correo = document.getElementById('owner-email').value.trim();
        const password = document.getElementById('owner-pass').value.trim();

        if (!correo || !password) return alert("Completa todos los campos");

        try {
            const res = await fetch(`${api}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, password })
            });

            const data = await res.json();

            if(data.success && data.rol === 'ADMIN') {
                // --- CRÍTICO: Guardamos la sesión ---
                localStorage.setItem('userEmail', data.correo);
                localStorage.setItem('userName', data.nombre);
                localStorage.setItem('userRole', data.rol);

                mostrarPanel(data.nombre, data.correo);
            } else {
                alert("Acceso denegado. Solo administradores pueden entrar aquí.");
            }
        } catch (e) {
            alert("Error de conexión con el servidor.");
        }
    }

    function mostrarPanel(nombre, correo) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('panel-control').style.display = 'block';
        document.getElementById('btn-salir').style.display = 'block';
        document.getElementById('nombre-admin').innerText = nombre;
        document.getElementById('filtro-fecha-admin').valueAsDate = new Date();
        
        cargarInfoNegocio(correo);
        cargarAgendaGlobal();
    }

    async function cargarInfoNegocio(email) {
        try {
            const res = await fetch(`${api}/api/propios/${email}`);
            const negocios = await res.json();
            if(negocios && negocios.length > 0) {
                miNegocioActual = negocios[0];
                serviciosLocales = miNegocioActual.servicios || [];
                document.getElementById('slug-negocio').innerText = "ID Negocio: " + miNegocioActual.idSlug;
                
                // Cargamos horarios con valores por defecto si no existen
                document.getElementById('h-inicio').value = miNegocioActual.horario?.inicio || "08:00";
                document.getElementById('h-fin').value = miNegocioActual.horario?.fin || "18:00";
                renderServicios();
            }
        } catch (e) { console.error("Error cargando negocio", e); }
    }

    async function cargarAgendaGlobal() {
        const fecha = document.getElementById('filtro-fecha-admin').value;
        const barbero = document.getElementById('filtro-empleado-admin').value;
        const tabla = document.getElementById('lista-citas-global');
        
        try {
            const res = await fetch(`${api}/api/admin/citas-global?fecha=${fecha}&barbero=${barbero}`);
            const citas = await res.json();
            
            tabla.innerHTML = "";
            if (citas.length === 0) {
                tabla.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:20px; color:#888;'>No hay citas registradas.</td></tr>";
                return;
            }

            citas.forEach(cita => {
                tabla.innerHTML += `
                    <tr>
                        <td><strong>${cita.hora}</strong></td>
                        <td>${cita.clienteNombre}</td>
                        <td><span style="color:#888">${cita.barbero}</span></td>
                        <td><span class="status-badge" style="background:${cita.estado === 'atendido' ? '#e8f5e9' : '#fff3e0'}; color:${cita.estado === 'atendido' ? 'green' : 'orange'}">${cita.estado}</span></td>
                        <td><button class="btn-danger" onclick="eliminarCita('${cita._id}')">Eliminar</button></td>
                    </tr>
                `;
            });
        } catch (e) { console.error("Error agenda", e); }
    }

    async function eliminarCita(id) {
        if(!confirm("¿Estás seguro de eliminar esta cita? Esta acción no se puede deshacer.")) return;
        const res = await fetch(`${api}/api/admin/cancelar/${id}`, { method: 'DELETE' });
        if(res.ok) cargarAgendaGlobal();
    }

    function renderServicios() {
        const div = document.getElementById('lista-servicios');
        div.innerHTML = "";
        serviciosLocales.forEach((s, index) => {
            div.innerHTML += `
                <div class="item-flex">
                    <div><strong>${s.nombre}</strong> - <span style="color:var(--accent)">$${Number(s.precio).toLocaleString()}</span></div>
                    <button onclick="eliminarServicio(${index})" style="background:none; border:none; color:red; cursor:pointer; font-size:18px;">✖</button>
                </div>
            `;
        });
    }

    function agregarServicio() {
        const n = document.getElementById('new-service-name').value;
        const p = document.getElementById('new-service-price').value;
        if(n && p) {
            serviciosLocales.push({ nombre: n, precio: parseInt(p) });
            document.getElementById('new-service-name').value = "";
            document.getElementById('new-service-price').value = "";
            renderServicios();
        } else {
            alert("Escribe el nombre y el precio del servicio");
        }
    }

    function eliminarServicio(i) {
        if(confirm("¿Eliminar servicio?")) {
            serviciosLocales.splice(i, 1);
            renderServicios();
        }
    }

    async function guardarCambios() {
        const horario = {
            inicio: document.getElementById('h-inicio').value,
            fin: document.getElementById('h-fin').value
        };
        try {
            const res = await fetch(`${api}/api/negocios/${miNegocioActual.idSlug}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ servicios: serviciosLocales, horario: horario })
            });
            if(res.ok) alert("✅ Configuración guardada. Los cambios ya son visibles para tus clientes.");
        } catch (e) { alert("Error al conectar con el servidor."); }
    }

    function cerrarSesion() {
        localStorage.clear();
        location.reload();
    }
</script>
