<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | Agendate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a1a1a; 
            --accent: #d4af37; 
            --bg: #ffffff; 
            --error: #e74c3c;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background: #f4f7f6; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        .logo { 
            font-weight: 800; 
            font-size: 28px; 
            margin-bottom: 30px; 
            color: var(--primary); 
            letter-spacing: -1px;
        }
        .logo span { color: var(--accent); }
        h2 { font-weight: 800; font-size: 22px; margin-bottom: 8px; color: #333; }
        p { color: #777; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 2px solid #eee; 
            outline: none; 
            font-size: 16px; 
            box-sizing: border-box; 
            font-family: inherit; 
            transition: all 0.3s; 
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }
        .btn-login { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-size: 16px; 
            margin-top: 10px;
        }
        .btn-login:hover { background: #000; transform: translateY(-2px); }
        .btn-login:disabled { background: #ccc; cursor: not-allowed; }
        #paso-2 { display: none; }
        .loader { display: none; color: var(--accent); margin-top: 15px; font-size: 13px; font-weight: 600; }
        .resend-link { margin-top: 25px; font-size: 13px; cursor: pointer; color: #888; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">AGENDATE<span>LIVE</span></div>
        
        <div id="paso-1">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para recibir tu código de acceso.</p>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button class="btn-login" id="btn-envio" onclick="iniciarLogin()">Obtener Código</button>
            <div id="load-1" class="loader">Verificando y enviando código...</div>
        </div>

        <div id="paso-2">
            <h2>Verifica tu cuenta</h2>
            <p>Introduce el código enviado a tu correo.</p>
            
            <input type="text" id="codigo" placeholder="000000" maxlength="6" 
                   style="text-align:center; letter-spacing: 8px; font-weight: 800; font-size: 28px;">
            
            <button class="btn-login" id="btn-verificar" style="background: var(--accent);" onclick="verificarCodigo()">Confirmar Acceso</button>
            <div class="resend-link" onclick="location.reload()">¿No recibiste nada? Reintentar</div>
        </div>
    </div>

    <script>
        const API = "https://mis-barberias.onrender.com";
        let userEmailTemp = "";

        // Limpiamos cualquier sesión previa al cargar el login
        window.onload = () => { localStorage.clear(); };

        async function iniciarLogin() {
            const emailInput = document.getElementById('email').value.trim().toLowerCase();
            const passInput = document.getElementById('password').value;

            if(!emailInput || !passInput) return alert("Completa todos los campos.");

            const btn = document.getElementById('btn-envio');
            const loader = document.getElementById('load-1');

            btn.disabled = true;
            loader.style.display = 'block';

            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: emailInput, password: passInput })
                });

                const data = await res.json();

                if(res.ok) {
                    userEmailTemp = emailInput; 
                    document.getElementById('paso-1').style.display = 'none';
                    document.getElementById('paso-2').style.display = 'block';
                } else {
                    alert(data.mensaje || "Credenciales incorrectas");
                }
            } catch (e) { 
                alert("Error de conexión con el servidor."); 
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        async function verificarCodigo() {
            const code = document.getElementById('codigo').value.trim();
            const btnVerificar = document.getElementById('btn-verificar');
            
            if(code.length < 6) return alert("El código debe tener 6 dígitos.");
            
            btnVerificar.disabled = true;
            btnVerificar.innerText = "Verificando...";

            try {
                const res = await fetch(`${API}/api/auth/verificar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: userEmailTemp, codigo: code })
                });

                const data = await res.json();
                
                if(data.success) {
                    // Guardamos los datos estandarizados
                    localStorage.setItem('user_email', data.correo);
                    localStorage.setItem('user_rol', data.rol);
                    localStorage.setItem('negocio_id', data.negocioId || "");
                    localStorage.setItem('user_nombre', data.nombre || ""); 

                    redirigirDinamico(data.rol);
                } else {
                    alert(data.mensaje || "Código incorrecto.");
                    btnVerificar.disabled = false;
                    btnVerificar.innerText = "Confirmar Acceso";
                }
            } catch (e) { 
                alert("Error en la verificación.");
                btnVerificar.disabled = false;
            }
        }

        function redirigirDinamico(rol) {
            // Sincronización de rutas: SUPER y ADMIN van al mismo panel de control
            const rutas = {
                'SUPER': 'panel-dueno.html',
                'ADMIN': 'panel-dueno.html',
                'STAFF': 'panel-empleado.html'
            };

            const destino = rutas[rol];
            if(destino) {
                window.location.href = destino;
            } else {
                alert("Rol no reconocido por el sistema: " + rol);
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
